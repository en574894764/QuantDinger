# 风控参数配置

account:
  max_total_position: 0.80         # 总仓位上限 80%
  max_drawdown: 0.18              # 账户级最大回撤熔断（从峰值计）
  max_daily_loss: 0.05            # 单日最大亏损
  max_positions: 12               # 最大持仓数量

position:
  max_single_position: 0.10       # 单票仓位上限
  stop_loss: -0.08                # 止损线
  daily_buy_limit: 1              # 同一标的单日最多买入次数

strategy:
  max_drawdown_multiplier: 1.5    # 策略回撤 vs 回测比例
  max_consecutive_losses: 6       # 连续亏损熔断
  sharpe_warning_multiplier: 0.3  # 滚动Sharpe < 回测×0.3 预警
  turnover_multiplier: 2.0        # 换手率异常阈值

correlation:
  warning_threshold: 0.7          # 持仓相关系数预警
  lookback_days: 90               # 计算相关性的回看天数

industry:
  max_industry_concentration: 0.30  # 单一行业最大占比

cooldown:
  strategy_cooldown_days: 5       # 策略级冷静期（交易日）
  account_cooldown_days: 7        # 账户级冷静期（交易日）

# 交易成本（回测用）
cost_model:
  a_shares:
    buy: 0.001     # 买入 0.1%（含滑点）
    sell: 0.0015   # 卖出 0.15%（含滑点+印花税）
  etf:
    buy: 0.0005
    sell: 0.0005
  hk_connect:
    buy: 0.0025
    sell: 0.0035

# 成交量约束（回测用）
volume_constraint:
  max_ratio: 0.01   # 单笔不超过日成交量 1%
